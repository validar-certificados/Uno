<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Validador de Certificados – UNO AFP</title>
  
  <link rel="icon" href="https://www.google.com/s2/favicons?domain=uno.cl&sz=128" type="image/png" />
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Poppins', sans-serif; background: #f8f9fb; color: #333; min-height: 100vh; display: flex; flex-direction: column; }
    .navbar { background: #fff; padding: 12px 40px; display: flex; align-items: center; gap: 12px; }
    .navbar img { height: 44px; object-fit: contain; }
    .nav-line { height: 3px; background: linear-gradient(90deg, #1a9ad9 0%, #1a7cbf 40%, #e040a0 100%); }
    main { flex: 1; padding: 24px 40px 60px; max-width: 1100px; margin: 0 auto; width: 100%; }
    .page-layout { display: flex; gap: 60px; align-items: flex-start; }
    .left-panel { flex: 1; padding-top: 10px; }
    .page-title { font-size: 2rem; font-weight: 700; color: #1a7cbf; text-transform: uppercase; line-height: 1.2; margin-bottom: 18px; }
    .right-panel { width: 480px; flex-shrink: 0; }
    .form-card { background: #fff; border-radius: 8px; box-shadow: 0 2px 16px rgba(0,0,0,.10); padding: 28px 28px 32px; }
    .field-group { margin-bottom: 16px; }
    .field-group label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 6px; }
    .field-group input { width: 100%; padding: 11px 14px; border: 1.5px solid #d0d8e0; border-radius: 6px; font-family: 'Poppins', sans-serif; outline: none; }
    .field-group input:focus { border-color: #1a7cbf; }
    .btn-valida { width: 100%; padding: 12px; background: #d0d8e0; color: #888; border: none; border-radius: 6px; font-family: 'Poppins', sans-serif; font-size: 0.92rem; font-weight: 600; cursor: not-allowed; }
    .btn-valida.ready { background: #1a7cbf; color: #fff; cursor: pointer; }
    .spinner { display: none; text-align: center; padding: 16px 0; }
    .spinner.active { display: block; }
    .spinner svg { animation: spin .9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .result-box { display: none; margin-top: 18px; border-radius: 6px; overflow: hidden; border: 1px solid #ddd; }
    .result-box.visible { display: block; }
    .result-header { padding: 10px 16px; font-weight: 600; font-size: 0.88rem; }
    .result-body { padding: 16px; background: #fff; }
    @media (max-width: 768px) {
      .page-layout { flex-direction: column; gap: 30px; }
      .right-panel { width: 100%; }
    }
  </style>
</head>
<body>
<div class="navbar"><img src="https://49659256.fs1.hubspotusercontent-na1.net/hubfs/49659256/PDFS/LOGOS%20AFP/LOGO%20UNO.png" alt="UNO AFP"/></div>
<div class="nav-line"></div>
<main>
  <div class="page-layout">
    <div class="left-panel"><h1 class="page-title">VALIDADOR DE CERTIFICADOS</h1></div>
    <div class="right-panel">
      <div class="form-card">
        <h3>Ingresa los siguientes datos</h3>
        <div class="field-group"><label>RUT del Afiliado</label><input type="text" id="rut" oninput="checkReady()"/></div>
        <div class="field-group"><label>Folio del Certificado</label><input type="text" id="folio" oninput="checkReady()"/></div>
        <button class="btn-valida" id="btn-valida" onclick="validar()">Valida</button>
        <div class="spinner" id="spinner"><svg width="28" height="28" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="#e0e0e0" stroke-width="3"/><path d="M12 2a10 10 0 0 1 10 10" stroke="#1a7cbf" stroke-width="3" stroke-linecap="round"/></svg></div>
        <div class="result-box" id="result-box"><div class="result-header" id="result-header"></div><div class="result-body" id="result-body"></div></div>
      </div>
    </div>
  </div>
</main>
<script>
  const WEBHOOK = 'https://hook.us2.make.com/iq6ps3txx1jaxr91mje7sx47ynbta3kb';
  function checkReady() {
    const btn = document.getElementById('btn-valida');
    if (document.getElementById('rut').value.trim() && document.getElementById('folio').value.trim()) { btn.classList.add('ready'); btn.disabled = false; }
    else { btn.classList.remove('ready'); btn.disabled = true; }
  }
  function abrirPDF(b64) {
    let base64 = b64.startsWith('data:') ? b64.split(',')[1] : b64;
    const binary = atob(base64); const array = new Uint8Array(binary.length);
    for(let i=0; i<binary.length; i++) array[i] = binary.charCodeAt(i);
    const url = URL.createObjectURL(new Blob([array], {type: 'application/pdf'}));
    window.open(url, '_blank');
  }
  async function validar() {
    const uuid = document.getElementById('folio').value.trim();
    if (!uuid) return;
    document.getElementById('btn-valida').disabled = true; document.getElementById('spinner').classList.add('active'); document.getElementById('result-box').classList.remove('visible');
    const controller = new AbortController(); const timeout = setTimeout(() => controller.abort(), 30000);
    try {
      const res = await fetch(WEBHOOK, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ uuid: uuid, afp: 'UNO' }), signal: controller.signal });
      clearTimeout(timeout); const data = await res.json();
      document.getElementById('spinner').classList.remove('active');
      const box = document.getElementById('result-box'), hdr = document.getElementById('result-header'), bdy = document.getElementById('result-body');
      if (data.found === true && data.pdf) {
        hdr.style.cssText = 'background: #e0f4ff; color: #1a7cbf; border-bottom: 3px solid #1a7cbf;'; hdr.innerHTML = `✅ ¡Confirmado! El certificado es válido`;
        bdy.innerHTML = `<div style="text-align:center;"><button onclick="abrirPDF('${data.pdf}')" style="background:#e040a0; color:#fff; border:none; padding:10px 24px; border-radius:6px; cursor:pointer; font-weight:bold;">Descargar Copia PDF</button></div>`;
      } else if (data.found === false) {
        hdr.style.cssText = 'background: #ffebee; color: #c62828; border-bottom: 3px solid #c62828;'; hdr.innerHTML = `❌ Certificado no encontrado`;
        bdy.innerHTML = `<p>No hemos encontrado este certificado.</p>`;
      }
      box.classList.add('visible');
    } catch(err) {
      clearTimeout(timeout); document.getElementById('spinner').classList.remove('active');
      document.getElementById('result-header').style.cssText = 'background: #ffebee; color: #c62828;'; document.getElementById('result-header').innerHTML = '⚠️ Error de conexión.';
      document.getElementById('result-box').classList.add('visible');
    } finally { checkReady(); }
  }
</script>
</body>
</html>
